services:
  - type: web
    name: bingo-backend
    runtime: node
    rootDir: bingo-game/backend
    buildCommand: npm install && npm run build
    startCommand: node dist/src/server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5000
